# Project-wide Gradle settings

# Enable AndroidX — required for all modern Jetpack / Material 3 dependencies
android.useAndroidX=true

# Kotlin code style for this project (defaults to official Kotlin style guide)
kotlin.code.style=official

# Jetifier is not needed — all dependencies are already AndroidX-native
android.enableJetifier=false

# Increase heap for large Compose builds — use JDK 17 explicitly
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64

# Parallel build execution
org.gradle.parallel=true
